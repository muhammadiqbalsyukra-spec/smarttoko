<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Toko Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
header {background:#28a745; color:white; padding:15px; text-align:center;}
.container {padding:10px; max-width:600px; margin:auto;}
input {width:100%; padding:10px; margin-bottom:8px;}
.card {background:white; padding:10px; border-radius:10px; margin-bottom:10px;}
button {padding:8px; border:none; border-radius:6px; margin-top:5px;}
.btn {background:green; color:white;}
.btn-del {background:#333; color:white;}
.total {font-size:18px; font-weight:bold;}
</style>
</head>

<body>

<header><h2>Stok Toko Pro</h2></header>

<div class="container">

<div class="card">
<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama barang">
<input id="barcodeInput" placeholder="Barcode (auto)">
<input id="stok" type="number" placeholder="Stok awal (PCS)">
<input id="harga_pcs" type="number" placeholder="Harga PCS">
<input id="harga_crt" type="number" placeholder="Harga CRT">
<input id="isi" type="number" placeholder="Isi per CRT (contoh 12)">
<button class="btn" onclick="tambahProduk()">Simpan</button>
</div>

<button onclick="startScanner()">📷 Scan Barcode</button>
<div id="reader"></div>

<input id="search" placeholder="Scan / ketik nama / barcode..." onkeyup="cariProduk(event)">

<div id="hasil"></div>

<h3>🛒 Keranjang</h3>
<div id="cart"></div>
<div id="total" class="total"></div>
<button class="btn" onclick="checkout()">Checkout</button>

</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || [];
let cart = [];

function save(){
 localStorage.setItem("db", JSON.stringify(db));
}

function rupiah(a){
 return "Rp " + (a||0).toLocaleString("id-ID");
}

function genBarcode(){
 return Date.now().toString();
}

// 🔥 KONVERSI PCS → CRT
function konversiPCS(qty, isi){
 let crt = Math.floor(qty / isi);
 let sisa = qty % isi;

 let text="";
 if(crt>0) text += crt+" CRT ";
 if(sisa>0) text += sisa+" PCS";

 return text || "0";
}

// TAMBAH PRODUK
function tambahProduk(){
 let nama = namaEl.value.trim();
 let barcode = barcodeInput.value.trim() || genBarcode();
 let stok = parseInt(stokEl.value);
 let harga_pcs = parseInt(harga_pcsEl.value);
 let harga_crt = parseInt(harga_crtEl.value);
 let isi = parseInt(isiEl.value);

 if(!nama || isNaN(stok) || isNaN(harga_pcs) || isNaN(isi)){
  alert("Data belum lengkap!");
  return;
 }

 if(db.find(x=>x.barcode===barcode)){
  alert("Barcode sudah ada!");
  return;
 }

 db.push({nama, barcode, stok, harga_pcs, harga_crt, isi});
 save();

 namaEl.value="";
 barcodeInput.value="";
 stokEl.value="";
 harga_pcsEl.value="";
 harga_crtEl.value="";
 isiEl.value="";

 alert("Produk tersimpan");
}

// 🔥 AUTO KASIR CEPAT
function tambahCartCepat(code){
 let p = db.find(x=>x.barcode===code);

 if(!p) return alert("Barang tidak ditemukan");

 if(p.stok <= 0) return alert("Stok habis");

 let item = cart.find(x=>x.barcode===code);

 if(item){
  item.qty += 1;
 } else {
  cart.push({...p, qty:1});
 }

 renderCart();
}

// SEARCH
function cariProduk(e){
 let keyword = search.value.toLowerCase();

 if(keyword===""){
  hasil.innerHTML="";
  return;
 }

 // ENTER → AUTO KASIR
 if(e.key==="Enter"){
  tambahCartCepat(keyword);
  search.value="";
  return;
 }

 let hasilFilter = db.filter(p=>p.nama.toLowerCase().includes(keyword));

 let html="";
 hasilFilter.forEach(p=>{
  html+=`
  <div class="card">
    <b>${p.nama}</b><br>
    PCS: ${rupiah(p.harga_pcs)}<br>
    CRT: ${rupiah(p.harga_crt)}<br>

    <button class="btn" onclick="tambahCartManual('${p.barcode}','pcs')">+ PCS</button>
    <button class="btn" onclick="tambahCartManual('${p.barcode}','crt')">+ CRT</button>
  </div>
  `;
 });

 hasil.innerHTML = html || "Tidak ditemukan";
}

// TAMBAH MANUAL
function tambahCartManual(code,mode){
 let p = db.find(x=>x.barcode===code);

 let qtyPCS = mode==="crt" ? p.isi : 1;

 if(p.stok < qtyPCS){
  alert("Stok tidak cukup");
  return;
 }

 let item = cart.find(x=>x.barcode===code);

 if(item){
  item.qty += qtyPCS;
 } else {
  cart.push({...p, qty:qtyPCS});
 }

 renderCart();
}

// RENDER
function renderCart(){
 let html="";
 let total=0;

 cart.forEach((c,i)=>{
  let sub = c.harga_pcs * c.qty;
  total += sub;

  html+=`
  <div class="card">
    <b>${c.nama}</b><br>
    ${konversiPCS(c.qty, c.isi)}<br>
    = ${rupiah(sub)}<br>
    <button class="btn-del" onclick="hapus(${i})">Hapus</button>
  </div>
  `;
 });

 cartEl.innerHTML = html || "Kosong";
 totalEl.innerHTML = "Total: "+rupiah(total);
}

// HAPUS
function hapus(i){
 cart.splice(i,1);
 renderCart();
}

// CHECKOUT
function checkout(){
 if(cart.length===0) return alert("Keranjang kosong");

 cart.forEach(c=>{
  let p = db.find(x=>x.barcode===c.barcode);
  p.stok -= c.qty;
 });

 cart=[];
 save();
 renderCart();

 alert("Transaksi selesai");
}

// 🔥 SCANNER (AUTO MASUK)
function startScanner(){
 const scanner = new Html5Qrcode("reader");

 scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  (text)=>{
    tambahCartCepat(text);
    scanner.stop();
    reader.innerHTML="";
  }
 );
}

// INIT
const namaEl = document.getElementById("nama");
const barcodeInput = document.getElementById("barcodeInput");
const stokEl = document.getElementById("stok");
const harga_pcsEl = document.getElementById("harga_pcs");
const harga_crtEl = document.getElementById("harga_crt");
const isiEl = document.getElementById("isi");

const search = document.getElementById("search");
const hasil = document.getElementById("hasil");
const cartEl = document.getElementById("cart");
const totalEl = document.getElementById("total");
const reader = document.getElementById("reader");

renderCart();

</script>

</body>
</html>
