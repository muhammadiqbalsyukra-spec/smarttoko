<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Pro Cloud</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
  --primary:#28a745;
  --bg:#f5f6fa;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
}

header{
  background:var(--primary);
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:12px;
  padding-bottom:90px;
  max-width:600px;
  margin:auto;
}

.card{
  background:white;
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:6px;
  font-weight:bold;
}

.btn{background:var(--primary); color:white;}
.btn-del{background:#e74c3c; color:white;}

.navbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.nav-item{
  text-align:center;
  font-size:12px;
  color:#999;
}

.nav-item.active{
  color:var(--primary);
  font-weight:bold;
}

.page{display:none; animation:fade .3s;}
.page.active{display:block;}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>🛒 Kasir Pro Cloud</header>

<div class="container">

<!-- LOGIN -->
<div id="pageLogin" class="card">
<h3>Login / Daftar</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="register()">Daftar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- KASIR -->
<div id="pageKasir" class="page active">

<div class="card">
<input id="nama" placeholder="Nama barang">
<input id="barcodeInput" placeholder="Barcode">
<input id="stok" type="number" placeholder="Stok">
<input id="harga" type="number" placeholder="Harga">
<button class="btn" onclick="tambahProduk()">Simpan Produk</button>
</div>

<button class="btn" onclick="startScanner()">📷 Scan</button>
<button class="btn-del" onclick="stopScanner()">❌ Tutup</button>
<div id="reader"></div>

<input id="search" placeholder="Scan / ketik..." onkeyup="cariProduk(event)">

<div id="cart" class="card"></div>
<div id="total"></div>
<button class="btn" onclick="checkout()">Checkout</button>

</div>

<!-- LAPORAN -->
<div id="pageLaporan" class="page">
<div id="laporan" class="card"></div>
<div id="riwayat"></div>
</div>

<!-- SETTING -->
<div id="pageSetting" class="page">
<div class="card">
<input id="set_toko" placeholder="Nama toko">
<button class="btn" onclick="simpanToko()">Simpan</button>
<button class="btn-del" onclick="logout()">Logout</button>
</div>
</div>

</div>
</div>

<!-- NAV -->
<div class="navbar">
<div class="nav-item active" onclick="showPage('Kasir',this)">🏠<br>Kasir</div>
<div class="nav-item" onclick="showPage('Laporan',this)">📊<br>Laporan</div>
<div class="nav-item" onclick="showPage('Setting',this)">⚙️<br>Setting</div>
</div>

<script>

  const firebaseConfig = {
  apiKey: "AIzaSyBYkPd9KaoJoSEAhO2BsVz8P76GnNJuVnY",
  authDomain: "smarttoko-cfa75.firebaseapp.com",
  projectId: "smarttoko-cfa75",
  storageBucket: "smarttoko-cfa75.firebasestorage.app",
  messagingSenderId: "408497647205",
  appId: "1:408497647205:web:cedd0b3ec9775c4897e08c",
  measurementId: "G-PV0T28BK91"
};


firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user=null;
let produk=[], cart=[], riwayat=[];

// AUTH
function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>alert("Berhasil daftar"));
}

function login(){
 auth.signInWithEmailAndPassword(email.value,password.value);
}

function logout(){
 auth.signOut();
}

auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  pageLogin.style.display="none";
  app.style.display="block";
  loadData();
 }else{
  pageLogin.style.display="block";
  app.style.display="none";
 }
});

// NAV
function showPage(p,el){
 document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
 document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));

 document.getElementById("page"+p).classList.add("active");
 el.classList.add("active");
}

// UTIL
function rupiah(n){return "Rp "+(n||0).toLocaleString("id-ID");}

// FIRESTORE
function loadData(){
 db.collection("users").doc(user.uid).collection("produk")
 .onSnapshot(snap=>{
  produk=[];
  snap.forEach(doc=>produk.push({...doc.data(),id:doc.id}));
 });

 db.collection("users").doc(user.uid).collection("transaksi")
 .onSnapshot(snap=>{
  riwayat=[];
  snap.forEach(doc=>riwayat.push(doc.data()));
  renderLaporan();
 });
}

// PRODUK
function tambahProduk(){
 db.collection("users").doc(user.uid).collection("produk").add({
  nama:nama.value,
  barcode:barcodeInput.value||Date.now(),
  stok:parseInt(stok.value),
  harga:parseInt(harga.value)
 });
}

// CART
function tambahCart(code){
 let p=produk.find(x=>x.barcode==code);
 if(!p || p.stok<=0) return alert("Stok habis");

 let item=cart.find(x=>x.barcode==code);
 if(item) item.qty++; else cart.push({...p,qty:1});

 renderCart();
}

function renderCart(){
 let html="",total=0;

 cart.forEach(c=>{
  let sub=c.qty*c.harga;
  total+=sub;

  html+=`${c.nama}<br>${c.qty} x ${rupiah(c.harga)} = ${rupiah(sub)}<hr>`;
 });

 document.getElementById("cart").innerHTML=html||"Kosong";
 document.getElementById("total").innerHTML="Total: "+rupiah(total);
}

// CHECKOUT
function checkout(){
 let total=0;

 cart.forEach(c=>{
  total+=c.qty*c.harga;

  let ref=db.collection("users").doc(user.uid)
  .collection("produk").doc(c.id);

  ref.update({stok:c.stok-c.qty});
 });

 db.collection("users").doc(user.uid).collection("transaksi")
 .add({total:total,tgl:new Date().toLocaleString()});

 cart=[];
}

// LAPORAN
function renderLaporan(){
 let total=riwayat.reduce((a,b)=>a+b.total,0);

 document.getElementById("laporan").innerHTML=
 `Transaksi: ${riwayat.length}<br>Omset: ${rupiah(total)}`;

 document.getElementById("riwayat").innerHTML=
 riwayat.slice(0,5).map(r=>`${rupiah(r.total)}<hr>`).join("");
}

// SCAN
let scanner=null;

function startScanner(){
 if(scanner) return;

 scanner=new Html5Qrcode("reader");
 scanner.start({facingMode:"environment"},{fps:10},
 text=>tambahCart(text));
}

function stopScanner(){
 if(scanner){
  scanner.stop();
  scanner=null;
 }
}

// SEARCH
function cariProduk(e){
 if(e.key==="Enter"){
  tambahCart(search.value);
  search.value="";
 }
}

</script>

</body>
</html>
