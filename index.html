<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Toko Pro</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
header {background:#28a745; color:white; padding:15px; text-align:center;}
.container {padding:10px; max-width:600px; margin:auto;}
input, select {width:100%; padding:10px; margin-bottom:8px;}
.card {background:white; padding:10px; border-radius:10px; margin-bottom:10px;}
button {padding:8px; border:none; border-radius:6px; margin-top:5px;}
.btn {background:green; color:white;}
.btn-out {background:red; color:white;}
.btn-del {background:#333; color:white;}
</style>
</head>

<body>

<header><h2>Stok Toko Pro</h2></header>

<div class="container">

<div class="card">
<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama barang">
<input id="barcodeInput" placeholder="Barcode (auto jika kosong)">
<select id="satuan">
<option>PCS</option>
<option>CRT</option>
</select>
<input type="number" id="stok" placeholder="Stok awal">
<input type="number" id="harga" placeholder="Harga jual">
<button class="btn" onclick="tambahProduk()">Simpan</button>
</div>

<button onclick="startScanner()">📷 Scan Barcode</button>
<div id="reader"></div>

<input id="search" placeholder="Scan / ketik barcode lalu ENTER" onkeyup="cariProduk(event)">

<div id="hasil"></div>

<h3>Daftar Produk</h3>
<div id="listProduk"></div>

<h3>Riwayat Transaksi</h3>
<div id="riwayat"></div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// SAVE
function save(){
 localStorage.setItem("db", JSON.stringify(db));
 localStorage.setItem("history", JSON.stringify(history));
}

// FORMAT RUPIAH
function rupiah(angka){
 return "Rp " + angka.toLocaleString("id-ID");
}

// AUTO BARCODE
function genBarcode(){
 return Date.now().toString();
}

// TAMBAH PRODUK
function tambahProduk(){
 let nama = document.getElementById("nama").value.trim();
 let barcode = document.getElementById("barcodeInput").value.trim() || genBarcode();
 let satuan = document.getElementById("satuan").value;
 let stok = parseInt(document.getElementById("stok").value);
 let harga = parseInt(document.getElementById("harga").value);

 if(!nama || isNaN(stok) || isNaN(harga)){
  alert("Lengkapi data!");
  return;
 }

 if(db.find(x=>x.barcode===barcode)){
  alert("Barcode sudah ada!");
  return;
 }

 db.push({nama, barcode, satuan, stok, harga});
 save();

 document.getElementById("nama").value="";
 document.getElementById("barcodeInput").value="";
 document.getElementById("stok").value="";
 document.getElementById("harga").value="";

 renderProduk();
 alert("Produk tersimpan ✅");
}

// CARI
function cariProduk(e){
 if(e.key==="Enter"){
  tampilProduk(document.getElementById("search").value);
 }
}

// TAMPIL PRODUK
function tampilProduk(code){
 let p = db.find(x=>x.barcode===code);

 if(!p){
  document.getElementById("hasil").innerHTML="Tidak ditemukan";
  return;
 }

 document.getElementById("hasil").innerHTML=`
  <div class="card">
    <b>${p.nama}</b><br>
    💰 ${rupiah(p.harga)}<br>
    📦 ${p.stok} ${p.satuan}<br>

    <input id="qty" type="number" placeholder="Jumlah beli">

    <button class="btn" onclick="jual('${p.barcode}')">🛒 Jual</button>

    <button onclick="printStruk('${p.barcode}')">🧾 Struk</button>
    <button onclick="printBarcode('${p.barcode}')">🏷 Barcode</button>
    <button onclick="printLabel('${p.barcode}')">📦 Label</button>

    <button class="btn-del" onclick="hapus('${p.barcode}')">Hapus</button>

    <svg id="bcode"></svg>
  </div>
 `;

 setTimeout(()=>{
   JsBarcode("#bcode", p.barcode);
 },100);
}

// JUAL
function jual(code){
 let qty = parseInt(document.getElementById("qty").value);
 let p = db.find(x=>x.barcode===code);

 if(!qty || p.stok < qty){
  alert("Stok tidak cukup!");
  return;
 }

 let total = p.harga * qty;
 let bayar = parseInt(prompt("Total: " + rupiah(total) + "\nUang bayar:"));

 if(isNaN(bayar) || bayar < total){
  alert("Uang kurang!");
  return;
 }

 let kembali = bayar - total;
 p.stok -= qty;

 history.push({
  tipe:"JUAL",
  nama:p.nama,
  qty,
  total,
  bayar,
  kembali,
  waktu:new Date().toLocaleString()
 });

 save();

 alert("Kembali: " + rupiah(kembali));

 renderProduk();
 renderHistory();
 tampilProduk(code);
}

// HAPUS
function hapus(code){
 if(!confirm("Hapus produk?")) return;

 db = db.filter(x=>x.barcode!==code);
 save();

 document.getElementById("hasil").innerHTML="";
 renderProduk();
}

// LIST
function renderProduk(){
 let html="";
 db.forEach(p=>{
  html+=`
   <div class="card">
    <b>${p.nama}</b><br>
    🏷 ${p.barcode}<br>
    💰 ${rupiah(p.harga)}<br>
    📦 ${p.stok} ${p.satuan}
   </div>
  `;
 });
 document.getElementById("listProduk").innerHTML=html || "Belum ada produk";
}

// RIWAYAT
function renderHistory(){
 let html="";
 history.slice().reverse().forEach(h=>{
  html+=`
   <div class="card">
    ${h.tipe} - ${h.nama}<br>
    Qty: ${h.qty}<br>
    Total: ${rupiah(h.total)}<br>
    Bayar: ${rupiah(h.bayar)}<br>
    Kembali: ${rupiah(h.kembali)}<br>
    ${h.waktu}
   </div>
  `;
 });
 document.getElementById("riwayat").innerHTML=html;
}

// SCANNER
function startScanner(){
 const scanner = new Html5Qrcode("reader");

 scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
  (text)=>{
    document.getElementById("search").value=text;
    tampilProduk(text);
    scanner.stop();
    document.getElementById("reader").innerHTML="";
  }
 );
}

// PRINT STRUK
function printStruk(code){
 let p = db.find(x=>x.barcode===code);

 let win = window.open("", "", "width=300,height=600");

 win.document.write(`
  <body onload="window.print();window.close();" style="font-family:monospace;font-size:12px;">
  <center><b>TOKO ANDA</b></center>
  <hr>
  ${p.nama}<br>
  ${p.barcode}<br>
  Harga: ${rupiah(p.harga)}<br>
  Stok: ${p.stok}<br>
  <hr>
  ${new Date().toLocaleString()}
  <hr>
  Terima Kasih
  </body>
 `);

 win.document.close();
}

// PRINT BARCODE
function printBarcode(code){
 let temp = document.createElement("svg");
 JsBarcode(temp, code);

 let win = window.open("", "", "width=300,height=400");

 win.document.write(`
  <body onload="window.print();window.close();" style="text-align:center;">
  ${temp.outerHTML}
  <div>${code}</div>
  </body>
 `);

 win.document.close();
}

// PRINT LABEL
function printLabel(code){
 let p = db.find(x=>x.barcode===code);

 let temp = document.createElement("svg");
 JsBarcode(temp, p.barcode, {height:40, displayValue:false});

 let win = window.open("", "", "width=300,height=200");

 win.document.write(`
  <body onload="window.print();window.close();" style="text-align:center;">
  <b>${p.nama}</b><br>
  ${temp.outerHTML}
  <div>${p.barcode}</div>
  </body>
 `);

 win.document.close();
}

// LOAD
window.onload = function(){
 renderProduk();
 renderHistory();
}

</script>

</body>
</html>
