<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Toko</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f4f6f9;}
header{background:#22c55e;color:#fff;padding:15px;text-align:center;}
.container{padding:10px;padding-bottom:100px;max-width:600px;margin:auto;}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:10px;border:none;border-radius:10px;margin-top:5px;}
.btn{background:#22c55e;color:white;}
.btn-del{background:red;color:white;}
.navbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#fff;padding:10px;}
.page{display:none;}
.page.active{display:block;}
</style>
</head>

<body>

<header>🛒 Smart Toko</header>

<div class="container">

<div id="loginPage" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button onclick="register()">Daftar</button>
</div>

<div id="app" style="display:none">

<!-- KASIR -->
<div id="pageKasir" class="page active">
<input id="search" placeholder="Scan / ketik..." oninput="autoSearch()">

<button class="btn" onclick="startScanner()">📷 Scan</button>
<button class="btn-del" onclick="stopScanner()">Stop</button>

<div id="reader"></div>

<div id="cartBox" class="card"></div>
<div id="totalBox"></div>

<button class="btn" onclick="checkout()">Checkout</button>

<div id="struk" class="card" style="display:none"></div>
<button class="btn" onclick="printStruk()">Print</button>
</div>

<!-- PRODUK -->
<div id="pageProduk" class="page">
<div class="card">

<button class="btn" onclick="startScanner()">📷 Scan Barcode Produk</button>

<input id="nama" placeholder="Nama barang">
<input id="barcodeInput" placeholder="Barcode">

<select id="satuan">
<option value="PCS">PCS</option>
<option value="CRT">CRT</option>
</select>

<input id="isi" type="number" placeholder="Isi per CRT (contoh 12)">
<input id="stok" type="number" placeholder="Stok">
<input id="harga" type="number" placeholder="Harga PCS">
<input id="harga_crt" type="number" placeholder="Harga CRT">

<button class="btn" onclick="tambahProduk()">Simpan</button>
</div>
</div>

</div>
</div>

<div class="navbar">
<button onclick="showPage('Kasir')">Kasir</button>
<button onclick="showPage('Produk')">Produk</button>
</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSy...",
 authDomain: "smarttoko-cfa75.firebaseapp.com",
 projectId: "smarttoko-cfa75"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null, produk=[], cart=[], scanner=null;
let lastScan="";

function beep(){
 new Audio("https://www.soundjay.com/button/beep-07.wav").play();
}

function register(){auth.createUserWithEmailAndPassword(email.value,password.value);}
function login(){auth.signInWithEmailAndPassword(email.value,password.value);}

auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  loginPage.style.display="none";
  app.style.display="block";
  loadData();
 }else{
  loginPage.style.display="block";
  app.style.display="none";
 }
});

function loadData(){
 db.collection("users").doc(user.uid).collection("produk")
 .onSnapshot(snap=>{
  produk=[];
  snap.forEach(d=>produk.push({...d.data(),id:d.id}));
 });
}

function showPage(p){
 document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
 document.getElementById("page"+p).classList.add("active");
 stopScanner();
}

function startScanner(){
 if(scanner) return;

 scanner=new Html5Qrcode("reader");

 scanner.start(
  { facingMode: "environment" },
  { fps:10, qrbox:250 },
  text=>{
    if(text===lastScan) return;
    lastScan=text;
    beep();
    handleScan(text);
    setTimeout(()=>lastScan="",1500);
  }
 );
}

function stopScanner(){
 if(scanner){
  scanner.stop().then(()=>{scanner=null;reader.innerHTML="";});
 }
}

// 🔥 FIX SCAN PRODUK
function handleScan(code){
 if(document.getElementById("pageProduk").classList.contains("active")){
   barcodeInput.value = code;
   return;
 }
 tambahCart(code);
}

// 🔥 TAMBAH PRODUK
function tambahProduk(){
 db.collection("users").doc(user.uid).collection("produk").add({
  nama:nama.value,
  barcode:barcodeInput.value,
  stok:parseInt(stok.value)||0,
  harga:parseInt(harga.value)||0,
  harga_crt:parseInt(harga_crt.value)||0,
  satuan:satuan.value,
  isi:parseInt(isi.value)||1
 });

 alert("Produk tersimpan");
}

// 🔥 FIX PCS ➜ CRT (tidak merusak data asli)
function tambahCart(code){
 let p=produk.find(x=>x.barcode==code);

 if(!p){ alert("Produk belum ada"); return; }

 let item=cart.find(x=>x.barcode==code);

 if(item){
   item.qty++;
 }else{
   cart.push({...p,qty:1});
 }

 renderCart();
}

function renderCart(){
 let html="",total=0;

 cart.forEach((c,i)=>{

  let harga = c.harga;
  let qty = c.qty;
  let label = "PCS";

  if(c.satuan==="PCS" && c.isi>0){
    let crt = Math.floor(qty / c.isi);
    let sisa = qty % c.isi;

    if(crt>0){
      html += `${c.nama}<br>${crt} CRT<br>`;
      total += crt * (c.harga_crt || c.harga);
    }

    if(sisa>0){
      html += `${sisa} PCS<br>`;
      total += sisa * c.harga;
    }

  }else{
    let sub = qty * (c.harga_crt || c.harga);
    total += sub;
    html += `${c.nama}<br>${qty} ${c.satuan}<br>`;
  }

  html += `<button onclick="hapus(${i})">Hapus</button><hr>`;
 });

 cartBox.innerHTML=html||"Kosong";
 totalBox.innerHTML="<b>Total: Rp "+total+"</b>";
}

function hapus(i){
 cart.splice(i,1);
 renderCart();
}

function autoSearch(){
 let code=search.value.trim();
 let p=produk.find(x=>x.barcode==code);
 if(p){
   tambahCart(code);
   search.value="";
 }
}

function checkout(){
 if(cart.length==0)return;

 let total=0;
 cart.forEach(c=>{
   total+=c.qty*c.harga;
 });

 tampilStruk(total);
 cart=[];
 renderCart();
}

function tampilStruk(total){
 struk.style.display="block";
 struk.innerHTML=`SMART TOKO<br>Total: Rp ${total}`;
}

// 🔥 PRINT FIX TOTAL
function printStruk(){
 let isi = struk.innerHTML;

 let w = window.open("", "_blank");
 w.document.write(`
 <html>
 <body>
 ${isi}
 <script>
 window.onload=function(){
   window.print();
   setTimeout(()=>window.close(),500);
 }
 <\/script>
 </body>
 </html>
 `);
}

</script>

</body>
</html>
