<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Toko Pro</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
header {background:#28a745; color:white; padding:15px; text-align:center;}
.container {padding:10px; max-width:600px; margin:auto;}
input, select {width:100%; padding:10px; margin-bottom:8px;}
.card {background:white; padding:10px; border-radius:10px; margin-bottom:10px;}
button {padding:8px; border:none; border-radius:6px; margin-top:5px;}
.btn {background:green; color:white;}
.btn-del {background:#333; color:white;}
.total {font-size:18px; font-weight:bold;}
</style>
</head>

<body>

<header><h2>Stok Toko Pro</h2></header>

<div class="container">

<div class="card">
<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama barang">
<input id="barcodeInput" placeholder="Barcode (auto jika kosong)">
<select id="satuan">
<option>PCS</option>
<option>CRT</option>
</select>
<input type="number" id="stok" placeholder="Stok awal">
<input type="number" id="harga" placeholder="Harga jual">
<button class="btn" onclick="tambahProduk()">Simpan</button>
</div>

<button onclick="startScanner()">📷 Scan Barcode</button>
<div id="reader"></div>

<input id="search" placeholder="Scan / ketik barcode lalu ENTER" onkeyup="cariProduk(event)">

<div id="hasil"></div>

<h3>🛒 Keranjang</h3>
<div id="cart"></div>
<div class="total" id="total"></div>
<button class="btn" onclick="checkout()">Checkout</button>

<h3>Daftar Produk</h3>
<div id="listProduk"></div>

<h3>Riwayat Transaksi</h3>
<div id="riwayat"></div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];
let cart = [];

function save(){
 localStorage.setItem("db", JSON.stringify(db));
 localStorage.setItem("history", JSON.stringify(history));
}

function rupiah(a){
 return "Rp " + a.toLocaleString("id-ID");
}

function genBarcode(){
 return Date.now().toString();
}

// TAMBAH PRODUK
function tambahProduk(){
 let nama = document.getElementById("nama").value.trim();
 let barcode = document.getElementById("barcodeInput").value.trim() || genBarcode();
 let satuan = document.getElementById("satuan").value;
 let stok = parseInt(document.getElementById("stok").value);
 let harga = parseInt(document.getElementById("harga").value);

 if(!nama || isNaN(stok) || isNaN(harga)){
  alert("Lengkapi data!");
  return;
 }

 if(db.find(x=>x.barcode===barcode)){
  alert("Barcode sudah ada!");
  return;
 }

 db.push({nama, barcode, satuan, stok, harga});
 save();
 renderProduk();

 document.getElementById("nama").value="";
 document.getElementById("barcodeInput").value="";
 document.getElementById("stok").value="";
 document.getElementById("harga").value="";
}

// CARI
function cariProduk(e){
 if(e.key==="Enter"){
  tampilProduk(document.getElementById("search").value);
 }
}

// TAMPIL PRODUK
function tampilProduk(code){
 let p = db.find(x=>x.barcode===code);

 if(!p){
  document.getElementById("hasil").innerHTML="Tidak ditemukan";
  return;
 }

 document.getElementById("hasil").innerHTML=`
  <div class="card">
    <b>${p.nama}</b><br>
    💰 ${rupiah(p.harga)}<br>
    📦 ${p.stok}<br>

    <input id="qty" type="number" placeholder="Jumlah">

    <button class="btn" onclick="tambahCart('${p.barcode}')">+ Keranjang</button>

    <svg id="bcode"></svg>
  </div>
 `;

 setTimeout(()=>JsBarcode("#bcode", p.barcode),100);
}

// TAMBAH KE KERANJANG
function tambahCart(code){
 let qty = parseInt(document.getElementById("qty").value);
 let p = db.find(x=>x.barcode===code);

 if(!qty || p.stok < qty){
  alert("Stok tidak cukup!");
  return;
 }

 let item = cart.find(x=>x.barcode===code);

 if(item){
  item.qty += qty;
 } else {
  cart.push({...p, qty});
 }

 renderCart();
}

// RENDER KERANJANG
function renderCart(){
 let html="";
 let total = 0;

 cart.forEach((c,i)=>{
  let sub = c.harga * c.qty;
  total += sub;

  html+=`
  <div class="card">
   ${c.nama}<br>
   ${c.qty} x ${rupiah(c.harga)} = ${rupiah(sub)}<br>
   <button class="btn-del" onclick="hapusCart(${i})">Hapus</button>
  </div>
  `;
 });

 document.getElementById("cart").innerHTML = html || "Kosong";
 document.getElementById("total").innerHTML = "Total: " + rupiah(total);
}

// HAPUS ITEM
function hapusCart(i){
 cart.splice(i,1);
 renderCart();
}

// PRINT STRUK
function printStrukKasir(data){

 let itemsHTML = "";
 data.items.forEach(i=>{
   itemsHTML += `
   <tr>
     <td>${i.nama}</td>
     <td>${i.qty} x ${rupiah(i.harga)}</td>
     <td align="right">${rupiah(i.qty*i.harga)}</td>
   </tr>
   `;
 });

 let win = window.open("", "", "width=300,height=600");

 win.document.write(`
 <html>
 <head>
 <style>
 body{font-family: monospace; width:220px; font-size:12px;}
 .center{text-align:center;}
 table{width:100%;}
 td{padding:2px 0;}
 .line{border-top:1px dashed #000; margin:5px 0;}
 </style>
 </head>

 <body onload="window.print();window.close();">

 <div class="center"><b>TOKO ANDA</b></div>
 <div class="center">Kasir Digital</div>

 <div class="line"></div>

 <table>
 ${itemsHTML}
 </table>

 <div class="line"></div>

 Total : ${rupiah(data.total)}<br>
 Bayar : ${rupiah(data.bayar)}<br>
 Kembali : ${rupiah(data.kembali)}<br>

 <div class="line"></div>

 ${data.waktu}

 <div class="line"></div>

 <div class="center">Terima Kasih</div>

 </body>
 </html>
 `);

 win.document.close();
}

// CHECKOUT
function checkout(){
 if(cart.length===0){
  alert("Keranjang kosong!");
  return;
 }

 let total = cart.reduce((a,c)=>a + c.harga*c.qty,0);

 let bayar = parseInt(prompt("Total: " + rupiah(total) + "\nUang bayar:"));

 if(isNaN(bayar) || bayar < total){
  alert("Uang kurang!");
  return;
 }

 let kembali = bayar - total;

 cart.forEach(c=>{
  let p = db.find(x=>x.barcode===c.barcode);
  p.stok -= c.qty;
 });

 let trx = {
  tipe:"JUAL",
  items:[...cart],
  total,
  bayar,
  kembali,
  waktu:new Date().toLocaleString()
 };

 history.push(trx);

 cart = [];
 save();

 alert("Kembali: " + rupiah(kembali));

 printStrukKasir(trx);

 renderCart();
 renderProduk();
 renderHistory();
}

// LIST PRODUK
function renderProduk(){
 let html="";
 db.forEach(p=>{
  html+=`
   <div class="card">
    <b>${p.nama}</b><br>
    💰 ${rupiah(p.harga)}<br>
    📦 ${p.stok}
   </div>
  `;
 });
 document.getElementById("listProduk").innerHTML = html || "Belum ada produk";
}

// RIWAYAT
function renderHistory(){
 let html="";
 history.slice().reverse().forEach(h=>{
  html+=`
  <div class="card">
   🧾 Transaksi<br>
   Total: ${rupiah(h.total)}<br>
   Bayar: ${rupiah(h.bayar)}<br>
   Kembali: ${rupiah(h.kembali)}<br>
   ${h.waktu}
  </div>
  `;
 });
 document.getElementById("riwayat").innerHTML=html;
}

// SCANNER
function startScanner(){
 const scanner = new Html5Qrcode("reader");

 scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
  (text)=>{
    document.getElementById("search").value=text;
    tampilProduk(text);
    scanner.stop();
    document.getElementById("reader").innerHTML="";
  }
 );
}

// LOAD
window.onload = function(){
 renderProduk();
 renderHistory();
 renderCart();
}

</script>

</body>
</html>
