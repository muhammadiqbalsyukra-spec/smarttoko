<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Toko</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{--primary:#22c55e;}
body{margin:0;font-family:sans-serif;background:#f4f6f9;}
header{background:var(--primary);color:#fff;padding:14px;text-align:center;font-weight:bold;}
.container{padding:12px;padding-bottom:110px;max-width:600px;margin:auto;}
.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,0,0,.08);}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-bottom:8px;}
button{width:100%;padding:10px;border:none;border-radius:10px;margin-top:5px;}
.btn{background:var(--primary);color:white;}
.btn-del{background:red;color:white;}
.navbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#fff;padding:10px;z-index:9999;}
.nav-item{text-align:center;font-size:12px;color:#888;}
.nav-item.active{color:var(--primary);font-weight:bold;}
.page{display:none;}
.page.active{display:block;}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:8px 14px;border-radius:20px;display:none;}
</style>
</head>

<body>

<header>Smart Toko</header>
<div id="toast"></div>

<div class="container">

<!-- LOGIN -->
<div id="pageLogin" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button onclick="register()">Daftar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- KASIR -->
<div id="pageKasir" class="page active">

<input id="search" placeholder="Scan / cari..." onkeyup="cariProduk(event)">
<button class="btn" onclick="startScanner()">Scan</button>
<button class="btn-del" onclick="stopScanner()">Stop</button>
<div id="reader"></div>

<div id="cartBox" class="card"></div>
<div id="totalBox"></div>

<button class="btn" onclick="checkout()">Checkout</button>

<div id="struk" class="card" style="display:none"></div>
<button class="btn" onclick="printStruk()">Print</button>

</div>

<!-- PRODUK -->
<div id="pageProduk" class="page">

<div class="card">
<input id="nama" placeholder="Nama barang">
<input id="barcodeInput" placeholder="Barcode">
<input id="stok" type="number" placeholder="Stok">
<input id="harga" type="number" placeholder="Harga">
<button class="btn" onclick="tambahProduk()">Simpan</button>
</div>

<div id="listProduk"></div>

</div>

<!-- LAPORAN -->
<div id="pageLaporan" class="page">
<div id="laporan" class="card"></div>
<div id="riwayat"></div>
</div>

<!-- SETTING -->
<div id="pageSetting" class="page">
<div class="card">
<input id="set_toko" placeholder="Nama toko">
<button class="btn" onclick="simpanToko()">Simpan</button>
<button class="btn-del" onclick="logout()">Logout</button>
</div>
</div>

</div>
</div>

<!-- NAV -->
<div class="navbar">
<div class="nav-item active" onclick="showPage('Kasir',this)">Kasir</div>
<div class="nav-item" onclick="showPage('Produk',this)">Produk</div>
<div class="nav-item" onclick="showPage('Laporan',this)">Laporan</div>
<div class="nav-item" onclick="showPage('Setting',this)">Setting</div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBYkPd9KaoJoSEAhO2BsVz8P76GnNJuVnY",
  authDomain: "smarttoko-cfa75.firebaseapp.com",
  projectId: "smarttoko-cfa75",
  storageBucket: "smarttoko-cfa75.firebasestorage.app",
  messagingSenderId: "408497647205",
  appId: "1:408497647205:web:cedd0b3ec9775c4897e08c",
  measurementId: "G-PV0T28BK91"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null, produk=[], keranjang=[], riwayat=[];
let isPremium=false;

// TOAST
function toast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2000);
}

// AUTH
function login(){auth.signInWithEmailAndPassword(email.value,password.value);}
function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
 .then(res=>{
   db.collection("users").doc(res.user.uid).set({premium:false});
   toast("Akun dibuat (Free)");
 });
}
function logout(){auth.signOut();}

// STATE
auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  pageLogin.style.display="none";
  app.style.display="block";
  loadData();
 }else{
  pageLogin.style.display="block";
  app.style.display="none";
 }
});

// NAV
function showPage(p,el){
 document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
 document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
 document.getElementById("page"+p).classList.add("active");
 el.classList.add("active");
}

// UTIL
function rupiah(n){return "Rp "+(n||0).toLocaleString("id-ID");}
function beep(){new Audio("https://www.soundjay.com/button/beep-07.wav").play();}

// LOAD
function loadData(){
 db.collection("users").doc(user.uid).get().then(doc=>{
  if(doc.exists){isPremium=doc.data().premium||false;}
 });

 db.collection("users").doc(user.uid).collection("produk")
 .onSnapshot(snap=>{
  produk=[];
  snap.forEach(d=>produk.push({...d.data(),id:d.id}));
  renderProduk();
 });

 db.collection("users").doc(user.uid).collection("transaksi")
 .onSnapshot(snap=>{
  riwayat=[];
  snap.forEach(d=>riwayat.push(d.data()));
  renderLaporan();
 });
}

// PRODUK
function tambahProduk(){
 if(!isPremium && produk.length>=20){
  return toast("Limit free 20 produk");
 }

 db.collection("users").doc(user.uid).collection("produk").add({
  nama:nama.value,
  barcode:barcodeInput.value||Date.now(),
  stok:parseInt(stok.value),
  harga:parseInt(harga.value)
 });
 toast("Produk ditambahkan");
}

function renderProduk(){
 let html="";
 produk.forEach(p=>{
  html+=`<div class="card">${p.nama}<br>Stok:${p.stok}
  <button onclick="hapusProduk('${p.id}')">Hapus</button></div>`;
 });
 listProduk.innerHTML=html||"Kosong";
}

function hapusProduk(id){
 db.collection("users").doc(user.uid).collection("produk").doc(id).delete();
}

// CART
function tambahCart(code){
 beep();
 let p=produk.find(x=>x.barcode==code);

 if(!p){
  barcodeInput.value=code;
  return toast("Produk belum ada");
 }

 if(p.stok<=0) return toast("Stok habis");

 let item=keranjang.find(x=>x.barcode==code);
 if(item)item.qty++; else keranjang.push({...p,qty:1});

 renderCart();
}

function renderCart(){
 let html="",total=0;

 keranjang.forEach((c,i)=>{
  let sub=c.qty*c.harga;
  total+=sub;

  html+=`${c.nama}<br>${c.qty} x ${rupiah(c.harga)}<br>${rupiah(sub)}
  <button onclick="hapus(${i})">Hapus</button><hr>`;
 });

 document.getElementById("cartBox").innerHTML=html||"Kosong";
 document.getElementById("totalBox").innerHTML="Total: "+rupiah(total);
}

function hapus(i){
 keranjang.splice(i,1);
 renderCart();
}

// CHECKOUT
function checkout(){
 if(keranjang.length==0) return;

 let total=0;
 let trx="TRX"+Date.now();

 keranjang.forEach(c=>{
  total+=c.qty*c.harga;

  db.collection("users").doc(user.uid)
  .collection("produk").doc(c.id)
  .update({stok:c.stok-c.qty});
 });

 db.collection("users").doc(user.uid)
 .collection("transaksi")
 .add({trx,total,tgl:new Date().toLocaleString()});

 tampilStruk(trx,total);

 keranjang=[];
 renderCart();
}

// STRUK
function tampilStruk(trx,total){
 struk.style.display="block";
 struk.innerHTML=`<b>${localStorage.getItem("nama_toko")||"TOKO"}</b><br>${trx}<br>Total: ${rupiah(total)}`;
}

function printStruk(){
 let w=window.open('','','width=300,height=600');
 w.document.write(struk.innerHTML);
 w.print();
}

// LAPORAN
function renderLaporan(){
 let total=riwayat.reduce((a,b)=>a+b.total,0);
 laporan.innerHTML=`Transaksi:${riwayat.length}<br>Omset:${rupiah(total)}`;
 riwayatEl.innerHTML=riwayat.map(r=>`${rupiah(r.total)}<hr>`).join("");
}

// SCAN
let scanner=null;
function startScanner(){
 if(scanner) return;
 scanner=new Html5Qrcode("reader");
 scanner.start({facingMode:"environment"},{fps:10},
 text=>tambahCart(text));
}
function stopScanner(){
 if(scanner){scanner.stop();scanner=null;}
}

// SEARCH
function cariProduk(e){
 if(e.key==="Enter"){
  tambahCart(search.value);
  search.value="";
 }
}

</script>

</body>
</html>
