<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Toko</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f4f6f9;}
header{background:#22c55e;color:#fff;padding:15px;text-align:center;}
.container{padding:10px;padding-bottom:100px;max-width:600px;margin:auto;}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:10px;border:none;border-radius:10px;margin-top:5px;}
.btn{background:#22c55e;color:white;}
.btn-del{background:red;color:white;}
.navbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#fff;padding:10px;}
.page{display:none;}
.page.active{display:block;}
</style>
</head>

<body>

<header>🛒 Smart Toko</header>

<div class="container">

<div id="loginPage" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button onclick="register()">Daftar</button>
</div>

<div id="app" style="display:none">

<!-- KASIR -->
<div id="pageKasir" class="page active">
<input id="search" placeholder="Scan / ketik..." oninput="autoSearch()">

<button class="btn" onclick="startScannerKasir()">📷 Scan Kasir</button>
<button class="btn-del" onclick="stopAllScanner()">Stop</button>

<div id="readerKasir"></div>

<div id="cartBox" class="card"></div>
<div id="totalBox"></div>

<!-- 🔥 TAMBAHAN UKURAN STRUK -->
<select id="ukuranStruk">
  <option value="58">58 mm (kecil)</option>
  <option value="72">72 mm</option>
  <option value="80">80 mm (besar)</option>
</select>

<button class="btn" onclick="checkout()">Checkout</button>

<div id="struk" class="card" style="display:none"></div>
<button class="btn" onclick="printStruk()">Print</button>
</div>

<!-- PRODUK -->
<div id="pageProduk" class="page">
<div class="card">

<button class="btn" onclick="startScannerProduk()">📷 Scan Barcode Produk</button>

<div id="readerProduk"></div>

<input id="nama" placeholder="Nama barang">
<input id="barcodeInput" placeholder="Barcode">

<select id="satuan">
<option value="PCS">PCS</option>
<option value="CRT">CRT</option>
</select>

<input id="isi" type="number" placeholder="Isi per CRT (contoh 12)">
<input id="stok" type="number" placeholder="Stok">
<input id="harga" type="number" placeholder="Harga PCS">
<input id="harga_crt" type="number" placeholder="Harga CRT">

<button class="btn" onclick="tambahProduk()">Simpan</button>
</div>
</div>

</div>
</div>

<div class="navbar">
<button onclick="showPage('Kasir')">Kasir</button>
<button onclick="showPage('Produk')">Produk</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBYkPd9KaoJoSEAhO2BsVz8P76GnNJuVnY",
  authDomain: "smarttoko-cfa75.firebaseapp.com",
  projectId: "smarttoko-cfa75",
  storageBucket: "smarttoko-cfa75.firebasestorage.app",
  messagingSenderId: "408497647205",
  appId: "1:408497647205:web:cedd0b3ec9775c4897e08c",
  measurementId: "G-PV0T28BK91"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

// GLOBAL
let user=null, produk=[], cart=[];
let scannerKasir=null, scannerProduk=null;
let lastScan="";

// SOUND
function beep(){
 new Audio("https://www.soundjay.com/button/beep-07.wav").play();
}

// LOGIN
function login(){
 auth.signInWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert("Login gagal: "+e.message));
}

function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert("Daftar gagal: "+e.message));
}

auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  loginPage.style.display="none";
  app.style.display="block";
  loadData();
 }else{
  loginPage.style.display="block";
  app.style.display="none";
 }
});

// LOAD DATA
function loadData(){
 db.collection("users").doc(user.uid).collection("produk")
 .onSnapshot(snap=>{
  produk=[];
  snap.forEach(d=>produk.push({...d.data(),id:d.id}));
 });
}

// NAVIGASI
function showPage(p){
 document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
 document.getElementById("page"+p).classList.add("active");
 stopAllScanner();
}

// SCANNER STOP
function stopAllScanner(){
 if(scannerKasir){
   scannerKasir.stop().catch(()=>{});
   scannerKasir=null;
   readerKasir.innerHTML="";
 }
 if(scannerProduk){
   scannerProduk.stop().catch(()=>{});
   scannerProduk=null;
   readerProduk.innerHTML="";
 }
}

// SCANNER KASIR
function startScannerKasir(){
 stopAllScanner();

 scannerKasir=new Html5Qrcode("readerKasir");

 scannerKasir.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  text=>{
    if(text===lastScan) return;
    lastScan=text;
    beep();
    tambahCart(text);
    setTimeout(()=>lastScan="",1500);
  }
 );
}

// SCANNER PRODUK
function startScannerProduk(){
 stopAllScanner();

 scannerProduk=new Html5Qrcode("readerProduk");

 scannerProduk.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  text=>{
    if(text===lastScan) return;
    lastScan=text;
    beep();
    barcodeInput.value=text;
    stopAllScanner();
    setTimeout(()=>lastScan="",1500);
  }
 );
}

// TAMBAH PRODUK
function tambahProduk(){
 if(!nama.value || !barcodeInput.value){
  alert("Isi data dulu");
  return;
 }

 db.collection("users").doc(user.uid).collection("produk").add({
  nama:nama.value,
  barcode:barcodeInput.value,
  stok:parseInt(stok.value)||0,
  harga:parseInt(harga.value)||0,
  harga_crt:parseInt(harga_crt.value)||0,
  satuan:satuan.value,
  isi:parseInt(isi.value)||1
 });

 alert("Produk tersimpan");

 nama.value="";
 barcodeInput.value="";
 stok.value="";
 harga.value="";
 harga_crt.value="";
 isi.value="";
}

// CART
function tambahCart(code){
 let p=produk.find(x=>x.barcode==code);
 if(!p){ alert("Produk belum ada"); return; }

 let item=cart.find(x=>x.barcode==code);
 if(item) item.qty++;
 else cart.push({...p,qty:1});

 renderCart();
}

function renderCart(){
 let html="",total=0;

 cart.forEach((c,i)=>{
  let sub = c.qty * (c.harga_crt || c.harga);
  total += sub;

  html+=`
  ${c.nama}<br>
  ${c.qty} x Rp ${c.harga} = Rp ${sub}<br>
  <button onclick="hapus(${i})">Hapus</button>
  <hr>`;
 });

 cartBox.innerHTML=html||"Kosong";
 totalBox.innerHTML="<b>Total: Rp "+total+"</b>";
}

function hapus(i){
 cart.splice(i,1);
 renderCart();
}

function autoSearch(){
 let code=search.value.trim();
 let p=produk.find(x=>x.barcode==code);
 if(p){
   tambahCart(code);
   search.value="";
 }
}

// CHECKOUT
function checkout(){
 if(cart.length==0)return;

 let total=0;
 cart.forEach(c=> total+=c.qty*(c.harga_crt||c.harga));

 tampilStruk(total);
 cart=[];
 renderCart();
}

// 🔥 STRUK BARU
function tampilStruk(total){
 let html = `<h3 style="text-align:center">SMART TOKO</h3><hr>`;

 cart.forEach(c=>{
   let harga = c.harga_crt || c.harga;
   let sub = c.qty * harga;

   html += `
   ${c.nama}<br>
   ${c.qty} x Rp ${harga} = Rp ${sub}<br><br>
   `;
 });

 html += `
 <hr>
 <b>Total: Rp ${total}</b><br><br>
 <div style="text-align:center">
 Terima kasih sudah berbelanja 🙏
 </div>
 `;

 struk.style.display="block";
 struk.innerHTML = html;
}

function printStruk(){
 let isi = document.getElementById("struk").innerHTML;
 let ukuran = document.getElementById("ukuranStruk").value;

 let width;
 if(ukuran=="58") width="220px";
 else if(ukuran=="72") width="260px";
 else width="300px";

 let w = window.open("", "_blank");

 w.document.open();
 w.document.write(`
 <html>
 <head>
 <title>Print</title>
 <style>
 body{
   font-family: monospace;
   width:${width};
   margin:auto;
   font-size:12px;
 }
 hr{border-top:1px dashed black;}
 h3{text-align:center;margin:5px 0;}
 </style>
 </head>
 <body>
 ${isi}
 </body>
 </html>
 `);

 w.document.close(); // 🔥 WAJIB

 // 🔥 Delay supaya konten benar-benar render
 setTimeout(()=>{
   w.focus();
   w.print();
 },500);
}

</script>

</body>
</html>
