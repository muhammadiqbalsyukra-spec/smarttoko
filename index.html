<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sesuai kebutuhan</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 10px;
}

.container {
  max-width: 500px;
  margin: auto;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  border: none;
  background: green;
  color: white;
  border-radius: 8px;
}

.struk {
  background: white;
  padding: 15px;
  font-size: 14px;
}
</style>

</head>
<body>

<div class="container">

<h2>Kasir Toko</h2>

<input type="text" id="barcode" placeholder="Scan / ketik barcode..." onkeyup="cariProduk(event)">

<div id="keranjang"></div>

<h3>Total: Rp <span id="total">0</span></h3>

<button onclick="buatStruk()">Cetak Struk</button>

<div id="struk"></div>

</div>

<script>
let produkDB = [
  {barcode: "111", nama: "Indomie Goreng", harga: 3000},
  {barcode: "222", nama: "Teh Botol", harga: 5000},
  {barcode: "333", nama: "Sosis Belfood", harga: 27000}
];

let keranjang = [];

function cariProduk(e) {
  if (e.key === "Enter") {
    let kode = document.getElementById("barcode").value;
    let produk = produkDB.find(p => p.barcode === kode);

    if (produk) {
      tambahKeranjang(produk);
    } else {
      alert("Produk tidak ditemukan");
    }

    document.getElementById("barcode").value = "";
  }
}

function tambahKeranjang(produk) {
  let item = keranjang.find(i => i.barcode === produk.barcode);

  if (item) {
    item.qty++;
  } else {
    keranjang.push({...produk, qty:1});
  }

  renderKeranjang();
}

function renderKeranjang() {
  let html = "";
  let total = 0;

  keranjang.forEach(item => {
    let subtotal = item.harga * item.qty;
    total += subtotal;

    html += `
      <div class="card">
        ${item.nama} x ${item.qty} <br>
        Rp ${subtotal}
      </div>
    `;
  });

  document.getElementById("keranjang").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function buatStruk() {
  let html = `
    <div class="struk">
      <h3>Karismu Shop</h3>
      <hr>
  `;

  keranjang.forEach(item => {
    html += `
      ${item.nama} x ${item.qty} <br>
      Rp ${item.harga * item.qty} <br>
    `;
  });

  html += `
      <hr>
      Total: Rp ${document.getElementById("total").innerText}
      <br><br>
      Terimakasih
    </div>
  `;

  document.getElementById("struk").innerHTML = html;
}
</script>

</body>
</html>
