<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Modern Lengkap</title>

<!-- LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {font-family: Arial; background:#f2f2f2; margin:0;}
header {background:#2c7be5; color:white; padding:15px; text-align:center;}
.container {padding:10px; max-width:600px; margin:auto;}
input, select {width:100%; padding:10px; margin-bottom:8px;}
.grid {display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
.card {background:white; padding:10px; border-radius:10px;}
button {padding:6px; margin-top:5px; border:none; border-radius:6px;}
.btn-add{background:green;color:white;}
.btn-edit{background:orange;color:white;}
.btn-del{background:red;color:white;}
.struk{background:white;padding:15px;margin-top:10px;font-size:13px;}
</style>
</head>

<body>

<header><h2>Kasir Modern Lengkap</h2></header>

<div class="container">

<!-- FORM -->
<div class="card">
<h3>Input Produk</h3>
<input type="hidden" id="editIndex">

<input type="text" id="namaBarang" placeholder="Nama barang">
<input type="number" id="hargaBarang" placeholder="Harga">
<input type="number" id="stokBarang" placeholder="Stok">

<select id="ukuran">
<option value="">Ukuran</option>
<option>S</option><option>M</option><option>L</option><option>XL</option>
</select>

<select id="warna">
<option value="">Warna</option>
<option>Merah</option><option>Biru</option><option>Hitam</option><option>Putih</option>
</select>

<button class="btn-add" onclick="simpanProduk()">Simpan Produk</button>
</div>

<!-- SCAN -->
<button onclick="startScanner()">Scan Barcode</button>
<div id="reader"></div>

<input type="text" id="barcode" placeholder="Scan / ketik barcode..." onkeyup="cariProduk(event)">

<h3>Catalog</h3>
<div class="grid" id="catalog"></div>

<h3>Keranjang</h3>
<div id="keranjang"></div>

<h3>Total: Rp <span id="total">0</span></h3>
<button onclick="buatStruk()">Cetak Struk</button>

<div id="struk"></div>

</div>

<script>

let produkDB = [];
let keranjang = [];

// GENERATE BARCODE
function generateBarcode(){
 return Date.now().toString();
}

// LOAD CATALOG
function loadCatalog(){
 let html="";
 produkDB.forEach((p,i)=>{
  html+=`
   <div class="card">
     <b>${p.nama}</b><br>
     Rp ${p.harga}<br>
     Stok: ${p.stok}<br>
     ${p.ukuran} | ${p.warna}<br>

     <svg id="barcode${i}"></svg>

     <button class="btn-add" onclick="tambahKeranjang('${p.barcode}')">Tambah</button>
     <button onclick="printBarcode('${p.barcode}')">Print</button>
     <button class="btn-edit" onclick="editProduk(${i})">Edit</button>
     <button class="btn-del" onclick="hapusProduk(${i})">Hapus</button>
   </div>
  `;
 });

 document.getElementById("catalog").innerHTML=html;

 produkDB.forEach((p,i)=>{
   JsBarcode(`#barcode${i}`, p.barcode);
 });
}

// SIMPAN
function simpanProduk(){
 let nama=document.getElementById("namaBarang").value;
 let harga=parseInt(document.getElementById("hargaBarang").value);
 let stok=parseInt(document.getElementById("stokBarang").value);
 let ukuran=document.getElementById("ukuran").value||"-";
 let warna=document.getElementById("warna").value||"-";
 let editIndex=document.getElementById("editIndex").value;

 if(!nama||!harga||!stok){
  alert("Lengkapi data!");
  return;
 }

 if(editIndex===""){
  produkDB.push({
    barcode:generateBarcode(),
    nama,harga,stok,ukuran,warna
  });
 }else{
  produkDB[editIndex]={...produkDB[editIndex],nama,harga,stok,ukuran,warna};
 }

 resetForm();
 loadCatalog();
}

// EDIT
function editProduk(i){
 let p=produkDB[i];
 document.getElementById("editIndex").value=i;
 document.getElementById("namaBarang").value=p.nama;
 document.getElementById("hargaBarang").value=p.harga;
 document.getElementById("stokBarang").value=p.stok;
 document.getElementById("ukuran").value=p.ukuran;
 document.getElementById("warna").value=p.warna;
}

// HAPUS
function hapusProduk(i){
 if(confirm("Hapus produk?")){
  produkDB.splice(i,1);
  loadCatalog();
 }
}

// RESET
function resetForm(){
 document.getElementById("editIndex").value="";
 document.getElementById("namaBarang").value="";
 document.getElementById("hargaBarang").value="";
 document.getElementById("stokBarang").value="";
 document.getElementById("ukuran").value="";
 document.getElementById("warna").value="";
}

// SCAN CAMERA
function startScanner(){
 const scanner = new Html5Qrcode("reader");

 scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  (decodedText) => {
    document.getElementById("barcode").value = decodedText;
    tambahKeranjang(decodedText);
    scanner.stop();
    document.getElementById("reader").innerHTML="";
  }
 ).catch(()=> alert("Kamera error"));
}

// BARCODE INPUT
function cariProduk(e){
 if(e.key==="Enter"){
  tambahKeranjang(document.getElementById("barcode").value);
  document.getElementById("barcode").value="";
 }
}

// TAMBAH KE KERANJANG
function tambahKeranjang(barcode){
 let p=produkDB.find(x=>x.barcode===barcode);

 if(!p){alert("Tidak ditemukan");return;}
 if(p.stok<=0){alert("Stok habis");return;}

 p.stok--;

 let item=keranjang.find(i=>i.barcode===barcode);

 if(item){item.qty++;}
 else{keranjang.push({...p,qty:1});}

 renderKeranjang();
 loadCatalog();
}

// RENDER
function renderKeranjang(){
 let html="";
 let total=0;

 keranjang.forEach(i=>{
  let sub=i.qty*i.harga;
  total+=sub;

  html+=`
   <div class="card">
    ${i.nama}<br>
    ${i.qty} x ${i.harga}<br>
    Rp ${sub}
   </div>
  `;
 });

 document.getElementById("keranjang").innerHTML=html;
 document.getElementById("total").innerText=total;
}

// STRUK
function buatStruk(){
 let html=`<div class="struk"><center><h3>Toko Kamu</h3></center><hr>`;

 keranjang.forEach(i=>{
  html+=`${i.nama}<br>${i.qty} x ${i.harga}<br>`;
 });

 html+=`<hr>Total: Rp ${document.getElementById("total").innerText}<br>Terimakasih</div>`;

 document.getElementById("struk").innerHTML=html;
}

// PRINT BARCODE
function printBarcode(code){
 let win = window.open("", "", "width=300,height=400");

 win.document.write(`
  <html>
  <head>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode"><\/script>
  </head>
  <body style="text-align:center;">
    <svg id="b"></svg>
    <p>${code}</p>
    <script>
      JsBarcode("#b","${code}");
      window.print();
    <\/script>
  </body>
  </html>
 `);

 win.document.close();
}

</script>

</body>
</html>
