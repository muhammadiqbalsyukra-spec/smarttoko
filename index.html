<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Toko Pro</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
header {background:#28a745; color:white; padding:15px; text-align:center;}
.container {padding:10px; max-width:600px; margin:auto;}
input, select {width:100%; padding:10px; margin-bottom:8px;}
.card {background:white; padding:10px; border-radius:10px; margin-bottom:10px;}
button {padding:8px; border:none; border-radius:6px; margin-top:5px;}
.btn {background:green; color:white;}
.btn-out {background:red; color:white;}
</style>
</head>

<body>

<header><h2>Stok Toko Pro</h2></header>

<div class="container">

<div class="card">
<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama barang">
<input id="barcodeInput" placeholder="Barcode (auto jika kosong)">
<select id="satuan">
<option>PCS</option>
<option>CRT</option>
</select>
<input type="number" id="stok" placeholder="Stok awal">
<button class="btn" onclick="tambahProduk()">Simpan</button>
</div>

<button onclick="startScanner()">Scan Barcode</button>
<div id="reader"></div>

<input id="search" placeholder="Cari barcode..." onkeyup="cariProduk(event)">

<div id="hasil"></div>

<h3>Daftar Produk</h3>
<div id="listProduk"></div>

<h3>Riwayat Transaksi</h3>
<div id="riwayat"></div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// SAVE
function save(){
 localStorage.setItem("db", JSON.stringify(db));
 localStorage.setItem("history", JSON.stringify(history));
}

// AUTO BARCODE
function genBarcode(){
 return Date.now().toString();
}

// TAMBAH PRODUK
function tambahProduk(){
 let nama = document.getElementById("nama").value;
 let barcode = document.getElementById("barcodeInput").value || genBarcode();
 let satuan = document.getElementById("satuan").value;
 let stok = parseInt(document.getElementById("stok").value);

 if(!nama || !stok){
  alert("Lengkapi data");
  return;
 }

 db.push({nama, barcode, satuan, stok});
 save();

 document.getElementById("nama").value="";
 document.getElementById("barcodeInput").value="";
 document.getElementById("stok").value="";

 renderProduk();
 renderHistory();

 alert("Produk tersimpan ✅");
}

// CARI
function cariProduk(e){
 if(e.key==="Enter"){
  tampilProduk(document.getElementById("search").value);
 }
}

// TAMPIL PRODUK
function tampilProduk(code){
 let p = db.find(x=>x.barcode===code);

 if(!p){
  document.getElementById("hasil").innerHTML="Tidak ditemukan";
  return;
 }

 document.getElementById("hasil").innerHTML=`
  <div class="card">
    <b>${p.nama}</b><br>
    Stok: ${p.stok} ${p.satuan}<br>

    <input id="qty" type="number" placeholder="Jumlah">

    <button class="btn" onclick="masuk('${p.barcode}')">Masuk</button>
    <button class="btn-out" onclick="keluar('${p.barcode}')">Keluar</button>

    <button onclick="printStruk('${p.barcode}')">Print Struk</button>
    <button onclick="printBarcode('${p.barcode}')">Print Barcode</button>

    <svg id="bcode"></svg>
  </div>
 `;

 setTimeout(()=>{
   JsBarcode("#bcode", p.barcode);
 },100);
}

// MASUK
function masuk(code){
 let qty = parseInt(document.getElementById("qty").value);
 let p = db.find(x=>x.barcode===code);

 if(!qty){
  alert("Isi jumlah");
  return;
 }

 p.stok += qty;

 history.push({
  tipe:"MASUK",
  nama:p.nama,
  qty,
  waktu:new Date().toLocaleString()
 });

 save();
 tampilProduk(code);
 renderProduk();
 renderHistory();
}

// KELUAR
function keluar(code){
 let qty = parseInt(document.getElementById("qty").value);
 let p = db.find(x=>x.barcode===code);

 if(!qty || p.stok < qty){
  alert("Stok tidak cukup");
  return;
 }

 p.stok -= qty;

 history.push({
  tipe:"KELUAR",
  nama:p.nama,
  qty,
  waktu:new Date().toLocaleString()
 });

 save();
 tampilProduk(code);
 renderProduk();
 renderHistory();
}

// LIST PRODUK
function renderProduk(){
 let html="";

 if(db.length === 0){
  html = "Belum ada produk";
 } else {
  db.forEach(p=>{
    html += `
    <div class="card">
      <b>${p.nama}</b><br>
      🏷 ${p.barcode}<br>
      📦 ${p.stok} ${p.satuan}
    </div>
    `;
  });
 }

 document.getElementById("listProduk").innerHTML = html;
}

// RIWAYAT
function renderHistory(){
 let html="";
 history.slice().reverse().forEach(h=>{
  html+=`
   <div class="card">
    ${h.tipe} - ${h.nama}<br>
    ${h.qty}<br>
    ${h.waktu}
   </div>
  `;
 });
 document.getElementById("riwayat").innerHTML=html;
}

// SCANNER
function startScanner(){
 const scanner = new Html5Qrcode("reader");

 scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
  (text)=>{
    document.getElementById("search").value=text;
    tampilProduk(text);
    scanner.stop();
    document.getElementById("reader").innerHTML="";
  }
 );
}

// PRINT STRUK 58MM
function printStruk(code){
 let p = db.find(x=>x.barcode===code);

 let win = window.open("", "", "width=300,height=600");

 win.document.write(`
  <html>
  <head>
    <style>
      body{
        font-family: monospace;
        width:220px;
        margin:0;
        padding:10px;
        font-size:12px;
      }
      .center{text-align:center;}
      .line{border-top:1px dashed #000; margin:5px 0;}
      .bold{font-weight:bold;}
    </style>
  </head>

  <body onload="window.print();window.close();">

    <div class="center bold">TOKO ANDA</div>
    <div class="center">Sorong</div>

    <div class="line"></div>

    Nama : ${p.nama}<br>
    Barcode : ${p.barcode}<br>
    Stok : ${p.stok} ${p.satuan}<br>

    <div class="line"></div>

    ${new Date().toLocaleString()}

    <div class="line"></div>

    <div class="center">Terima Kasih</div>

  </body>
  </html>
 `);

 win.document.close();
}

// PRINT BARCODE
function printBarcode(code){
 let win = window.open("","","width=300,height=400");

 win.document.write(`
  <html>
  <head>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode"><\/script>
  </head>
  <body>
  <script>
      window.onload = function(){
        JsBarcode("#b","${code}");
        setTimeout(()=>{ window.print(); },500);
      }
    <\/script>
  </body>
  </html>
 `);

 win.document.close();
}
// LOAD AWAL (FIX)
window.onload = function(){
 renderProduk();
 renderHistory();
}

</script>

</body>
</html>
